#################
####DATABASES####
#################
services:

  postgres:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: benchmark_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  mongo:
    image: mongo:7
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  redis:
    image: redis:7
    container_name: redis_db
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  neo4j:
    image: neo4j:5-enterprise
    container_name: neo4j_db
    ports:
      - "7474:7474"
      - "7687:7687"
      - "2004:2004"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_server_memory_pagecache_size: 128M
      NEO4J_server_memory_heap_initial__size: 128M
      NEO4J_server_memory_heap_max__size: 256M
      NEO4J_server_config_strict__validation_enabled: "false"
      NEO4J_server_metrics_prometheus_enabled: "true"
      NEO4J_server_metrics_prometheus_endpoint: "0.0.0.0:2004"
      NEO4J_server_metrics_enabled: "true"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 15s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
#################
####ECOMMERCE####
#################
  ecommerce_postgres:
    build:
      context: .
      dockerfile: services/ecommerce/postgres/Dockerfile
      args:
        EXTRA: postgres
    container_name: ecommerce_postgres_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/benchmark_db
    ports:
      - "8001:8000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  ecommerce_mongo:
    build:
      context: .
      dockerfile: services/ecommerce/mongo/Dockerfile
      args:
        EXTRA: mongo
    container_name: ecommerce_mongo_api
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: benchmark_db
    ports:
      - "8002:8000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  ecommerce_neo4j:
    build:
      context: .
      dockerfile: services/ecommerce/neo4j/Dockerfile
      args:
        EXTRA: neo4j
    container_name: ecommerce_neo4j_api
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
    ports:
      - "8003:8000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  ecommerce_redis:
    build:
      context: .
      dockerfile: services/ecommerce/redis/Dockerfile
      args:
        EXTRA: redis
    container_name: ecommerce_redis_api
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "8004:8000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
#################
#####WEB UI######
#################
  mongo-express:
    image: mongo-express:1
    container_name: mongo_express
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH: false
    ports:
      - "8081:8081"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres
#################
###MONITORING####
  #################
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - ecommerce_postgres
      - ecommerce_mongo
      - ecommerce_neo4j
      - ecommerce_redis

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@postgres:5432/benchmark_db?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  mongodb_exporter:
    image: percona/mongodb_exporter:0.40
    container_name: mongodb_exporter
    command: --mongodb.uri=mongodb://mongo:27017 --collect-all --compatible-mode
    ports:
      - "9216:9216"
    depends_on:
      mongo:
        condition: service_healthy
        
  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis_exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
  neo4j_data:
  redis_data:
  prometheus_data:
  grafana_data: